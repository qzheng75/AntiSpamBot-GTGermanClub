service: antispambot
frameworkVersion: '>=3'

provider:
  name: aws
  runtime: python3.9
  region: us-east-1

functions:
  receive:
    handler: handler.receive
    events:
      - http:
          path: receive
          method: post

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: false